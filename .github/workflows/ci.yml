name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Syntax check
        run: |
          node --check server.js
          node --check index.js

      - name: Security regression tests
        run: node test/security.test.js

      - name: Smoke test (server starts and /sse responds)
        run: |
          GOOGLE_CLIENT_ID=dummy \
          GOOGLE_CLIENT_SECRET=dummy \
          GOOGLE_REFRESH_TOKEN=dummy \
          node server.js &
          SERVER_PID=$!
          sleep 2
          OUTPUT=$(curl -s -N --max-time 2 http://localhost:8080/sse 2>/dev/null || true)
          kill $SERVER_PID
          if echo "$OUTPUT" | grep -q "event: endpoint"; then
            echo "Smoke test passed"
          else
            echo "Smoke test failed: $OUTPUT"
            exit 1
          fi

  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Dependency audit
        run: npm audit --audit-level=high

      - name: Secret scan
        run: |
          # Google OAuth クライアントシークレットのパターン
          if git ls-files | xargs grep -rE "GOCSPX-[A-Za-z0-9_-]{28}" 2>/dev/null; then
            echo "ERROR: Google Client Secret が検出されました"
            exit 1
          fi
          # Google リフレッシュトークンのパターン
          if git ls-files | xargs grep -rE "1//[A-Za-z0-9_-]{40,}" 2>/dev/null; then
            echo "ERROR: Google Refresh Token が検出されました"
            exit 1
          fi
          # .env ファイルが追跡されていないか確認
          if git ls-files | grep -q "^\.env$"; then
            echo "ERROR: .env がコミットされています"
            exit 1
          fi
          echo "Secret scan passed"
